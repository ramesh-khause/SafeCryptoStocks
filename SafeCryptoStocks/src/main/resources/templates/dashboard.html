<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    
    <!-- Adding CSS file -->
    <link rel="stylesheet" href="dashboard.css" th:href="@{/css/dashboard.css}"/>
</head>
<body>

    <!-- Navigation Bar -->
    <div id="navbar">
        <div id="logo">SafeCryptoStocks</div>
        <div id="menu">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/market}">Market</a>
            <a th:href="@{/portfolio}">Portfolio</a>
            <a th:href="@{/budget}">Budget</a>
            <a th:href="@{/learn}">Learn</a>
        </div>
        <div id="profile">
            <img th:src="@{/image/profileicon.png}" alt="Profile Picture" width="40" height="40">
            <div id="profile-info">
                <!-- Dynamically set userName -->
                <span id="user-name" th:text="'Hello, ' + ${userName}">Hello, User</span>
                <div id="view-profile">
                    <a th:href="@{/profile}">View Profile</a>
                </div>
                <!-- Logout Button -->
                <button id="logout-btn">Logout</button>
            </div>
        </div>
    </div>

    <!-- Dashboard Content -->
    <div id="dashboard-content">
        <!-- Space for My Portfolio -->
        <div id="my-portfolios">
            <h3>My Portfolios</h3>
            <p>Your portfolio details go here.</p>
        </div>

        <!-- Current Balance & Buy Stocks -->
        <div id="balance-section">
            <div id="current-balance">
                <h2>Current Balance</h2>
                <p>$872043.00</p>
                <span class="change">+$52384.00 (2.3%)</span>
            </div>
            <button id="buy-stocks">Buy Stocks</button>
        </div>

        <!-- Assets Section -->
        <div id="assets-section">
            <h3>Your Assets</h3>
            <table id="portfolio-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>24H%</th>
                        <th>Holdings</th>
                        <th>Avg. Buy Price</th>
                        <th>Profit/Loss</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Portfolio data will go here -->
                </tbody>
            </table>
        </div>
    </div>

    <script th:src="@{/js/dashboard.js}"></script>

</body>
</html>
